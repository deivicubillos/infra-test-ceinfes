name: Deploy App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build Docker
        run: docker build -t test-app ./app

      - name: Run container
        run: docker run -d -p 5000:5000 test-app

      - name: Test endpoint
        run: |
          echo "Esperando a que la app despierte..."
          sleep 10
          curl -v http://localhost:5000

      - name: Ver logs si falla
        if: failure()
        run: docker logs $(docker ps -lq)
